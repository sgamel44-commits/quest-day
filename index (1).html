// HELPERS
// ═══════════════════════════════════════════════════════════════════
function uid() { return `_${Math.random().toString(36).slice(2,9)}`; }
function getRank(xp) { return [...RANKS].reverse().find(r => xp >= r.min) || RANKS[0]; }
function todayKey() { return new Date().toISOString().slice(0,10); }
function h2r(h) { return `${parseInt(h.slice(1,3),16)},${parseInt(h.slice(3,5),16)},${parseInt(h.slice(5,7),16)}`; }

function rollDrop(packKey, ownedSet, stats) {
  const pack = PACKS[packKey];
  let available = pack.stickers.filter(s => !ownedSet.has(s.id));
  if (packKey === "streak_pack") available = available.filter(s => stats.streak >= (s.streakReq || 1));
  if (!available.length) return null;
  let total = available.reduce((s, st) => s + RARITY_WEIGHTS[st.rarity], 0);
  let roll = Math.random() * total;
  for (const s of available) { roll -= RARITY_WEIGHTS[s.rarity]; if (roll <= 0) return {...s, packKey}; }
  return {...available[available.length-1], packKey};
}

function pickBlob(ownedBlobSet) {
  const avail = BLOB_POOL.filter(b => !ownedBlobSet.has(b.id));
  return avail.length ? avail[Math.floor(Math.random() * avail.length)] : BLOB_POOL[Math.floor(Math.random() * BLOB_POOL.length)];
}

function pickLargeSticker(seenIds) {
  const seen = new Set(seenIds || []);
  const unseen = LARGE_STICKERS.filter(l => !seen.has(l.id));
  const pool = unseen.length ? unseen : LARGE_STICKERS;
  return pool[Math.floor(Math.random() * pool.length)];
}

// Encode/decode save state
function encodeState(owned, blobOwned, history, streak, lsHistory) {
  try {
    const d = {o:[...owned], b:[...blobOwned], h:history, s:streak, ls:lsHistory};
    return btoa(encodeURIComponent(JSON.stringify(d)));
  } catch { return ""; }
}
function decodeState(code) {
  try {
    const d = JSON.parse(decodeURIComponent(atob(code.trim())));
    if (!Array.isArray(d.o)) throw 0;
    return d;
  } catch { return null; }
}

function loadFromStorage() {
  try {
    const raw = localStorage.getItem('questday_v3');
    if (!raw) return null;
    return JSON.parse(raw);
  } catch { return null; }
}

function saveToStorage(data) {
  try { localStorage.setItem('questday_v3', JSON.stringify(data)); } catch {}
}

      border: `2px solid ${locked ? "rgba(255,255,255,0.04)" : r.border}`,
      boxShadow: locked ? "none" : `0 0 20px ${r.glow}`,
      position:"relative", overflow:"hidden", transition:"all 0.3s",
      cursor: owned ? "default" : "default",
    }}>
      {!locked && r.shimmer && (
        <div style={{position:"absolute",inset:0,pointerEvents:"none",overflow:"hidden",borderRadius:12}}>
          <div style={{position:"absolute",top:0,left:"-120%",width:"60%",height:"100%",

            animation:"shimmer 3s ease-in-out infinite"}}/>
        </div>
      )}
      <span style={{fontSize:locked?18:28, filter:locked?"grayscale(1) opacity(0.08)":"none", position:"relative", zIndex:1, animation: owned && r.shimmer ? "glow-pulse 3s infinite" : "none"}}>
        {sticker.emoji}
      </span>
      <span style={{fontSize:8, fontFamily:"'Space Mono',monospace", textAlign:"center", textTransform:"uppercase",
        lineHeight:1.3, padding:"0 3px", position:"relative", zIndex:1,
        color:locked?"rgba(255,255,255,0.06)":r.color, letterSpacing:"0.04em"}}>
        {sticker.label}

// Drop modal (sticker/blob/large earned)

  return (

        {!isLarge && !isBlob && <div style={{fontSize:10,fontFamily:"'Space Mono',monospace",color:r.color,letterSpacing:"0.12em",textTransform:"uppercase",marginBottom:14}}>{PACKS[drop.packKey]?.name} · {r.badge || "New!"}</div>}

        <div style={{
          margin:"0 auto 14px",
          animation:"float 2s ease-in-out infinite",
          width: isLarge?100:isBlob?72:70, height:isLarge?100:isBlob?72:70,
          borderRadius:isBlob?"50%":"18px",
          background: isBlob ? drop.bg : isLarge ? `radial-gradient(circle,${drop.glow},rgba(0,0,0,0))` : "transparent",
          display:"flex", alignItems:"center", justifyContent:"center",
          boxShadow: isLarge ? `0 0 40px ${drop.glow}` : "none",

          {isBlob

        <div style={{fontSize:20,fontWeight:800,color:"#e8e8f0",marginBottom:5}}>{drop.label || drop.name}</div>

          background:"transparent", border:`1px solid ${isLarge?drop.color:isBlob?"rgba(255,255,255,0.12)":r.border}`,
          borderRadius:12, color:isLarge?drop.color:isBlob?"#9ca3af":r.color,
          padding:"10px 32px", fontSize:13, cursor:"pointer",

        }}>

// Save/Restore modal
function SaveModal({ owned, blobOwned, history, streak, lsHistory, onClose, onRestore }) {
  const saveCode = encodeState(owned, blobOwned, history, streak, lsHistory);
  const [inputCode, setInputCode] = useState("");
  const [status, setStatus] = useState(null);
  const [copied, setCopied] = useState(false);
  const allStickers = Object.values(PACKS).flatMap(p => p.stickers);

  function doCopy() {
    navigator.clipboard?.writeText(saveCode).then(() => { setCopied(true); setTimeout(() => setCopied(false), 2000); });
  }
  function doRestore() {
    const d = decodeState(inputCode);
    if (!d) { setStatus("err"); return; }
    onRestore(d); setStatus("ok"); setTimeout(onClose, 1400);
  }

  return (
    <div onClick={onClose} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.92)",zIndex:800,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
      <div onClick={e=>e.stopPropagation()} style={{background:"#0f0f1c",border:"1px solid #1e1e30",borderRadius:22,padding:28,maxWidth:500,width:"100%",animation:"modalPop 0.4s ease"}}>
        <div style={{fontSize:18,fontWeight:800,color:"#e8e8f0",marginBottom:5}}>💾 Save Progress</div>
        <div style={{fontSize:11,fontFamily:"'Space Mono',monospace",color:"#6b6b8a",marginBottom:18}}>Copy this code. Paste it next session to restore everything.</div>

        <div style={{display:"flex",gap:10,marginBottom:18}}>
          {[
            {i:"🔥",v:streak,l:"streak"},
            {i:"✨",v:`${allStickers.filter(s=>owned.has(s.id)).length}/${allStickers.length}`,l:"stickers"},
            {i:"🫧",v:BLOB_POOL.filter(b=>blobOwned.has(b.id)).length,l:"blobs"},
            {i:"⚡",v:history.reduce((s,d)=>s+d.xp,0),l:"total xp"},
          ].map(s => (
            <div key={s.l} style={{flex:1,background:"#0a0a14",borderRadius:12,padding:"12px 8px",textAlign:"center",border:"1px solid #1a1a28"}}>
              <div style={{fontSize:16}}>{s.i}</div>
              <div style={{fontSize:14,fontWeight:800,color:"#f5c542"}}>{s.v}</div>
              <div style={{fontSize:8,fontFamily:"'Space Mono',monospace",color:"#6b6b8a",textTransform:"uppercase"}}>{s.l}</div>
            </div>
          ))}
        </div>

        <div style={{fontSize:9,fontFamily:"'Space Mono',monospace",color:"#6b6b8a",textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:7}}>Save Code</div>
        <div style={{display:"flex",gap:8,marginBottom:18}}>
          <textarea readOnly value={saveCode} style={{flex:1,height:72,background:"#0a0a14",border:"1px solid #1a1a28",borderRadius:10,color:"#4ade80",fontFamily:"'Space Mono',monospace",fontSize:10,padding:10,resize:"none",outline:"none",lineHeight:1.5,wordBreak:"break-all"}}/>
          <button onClick={doCopy} style={{width:86,background:copied?"rgba(74,222,128,0.1)":"rgba(245,197,66,0.08)",border:`1px solid ${copied?"rgba(74,222,128,0.4)":"rgba(245,197,66,0.25)"}`,borderRadius:10,color:copied?"#4ade80":"#f5c542",fontSize:11,cursor:"pointer",fontFamily:"'Space Mono',monospace",flexShrink:0,transition:"all 0.2s"}}>
            {copied?"✓ copied":"📋 copy"}
          </button>
        </div>

        <div style={{borderTop:"1px solid #1a1a28",marginBottom:16}}/>
        <div style={{fontSize:9,fontFamily:"'Space Mono',monospace",color:"#6b6b8a",textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:7}}>Restore</div>
        <div style={{display:"flex",gap:8,marginBottom:8}}>
          <textarea value={inputCode} onChange={e=>{setInputCode(e.target.value);setStatus(null);}} placeholder="Paste save code here..."
            style={{flex:1,height:60,background:"#0a0a14",border:`1px solid ${status==="err"?"rgba(239,68,68,0.5)":status==="ok"?"rgba(74,222,128,0.4)":"#1a1a28"}`,borderRadius:10,color:"#e8e8f0",fontFamily:"'Space Mono',monospace",fontSize:10,padding:10,resize:"none",outline:"none",lineHeight:1.5,wordBreak:"break-all"}}/>
          <button onClick={doRestore} disabled={!inputCode.trim()} style={{width:86,background:"rgba(96,165,250,0.08)",border:"1px solid rgba(96,165,250,0.25)",borderRadius:10,color:"#60a5fa",fontSize:11,cursor:inputCode.trim()?"pointer":"default",fontFamily:"'Space Mono',monospace",flexShrink:0,opacity:inputCode.trim()?1:0.4}}>restore</button>
        </div>
        {status==="ok" && <div style={{fontSize:11,fontFamily:"'Space Mono',monospace",color:"#4ade80",marginBottom:4}}>✓ Restored successfully!</div>}
        {status==="err" && <div style={{fontSize:11,fontFamily:"'Space Mono',monospace",color:"#f87171",marginBottom:4}}>✗ Invalid code — try again</div>}

        <button onClick={onClose} style={{width:"100%",background:"none",border:"1px solid #1a1a28",borderRadius:10,color:"#6b6b8a",padding:11,fontSize:12,cursor:"pointer",fontFamily:"inherit",marginTop:10}}>close</button>
      </div>
    </div>
  );
}

// Task row
function TaskRow({ task, isDone, onToggle, catColor }) {
  const [hov, setHov] = useState(false);
  return (
    <div
      onClick={() => onToggle(task.id)}
      onMouseEnter={() => setHov(true)}
      onMouseLeave={() => setHov(false)}
      style={{
        display:"flex", alignItems:"flex-start", gap:14, padding:"13px 16px",
        borderRadius:12, marginBottom:8,
        border:`1px solid ${isDone?"rgba(74,222,128,0.18)":hov?"rgba(255,255,255,0.09)":"#16162a"}`,
        background: isDone?"rgba(74,222,128,0.04)":hov?"#111122":"#0e0e1c",
        cursor:"pointer", transition:"all 0.15s", opacity:isDone?0.55:1,
        borderLeft:`3px solid ${catColor}`,
        animation:"slideUp 0.2s ease",
      }}>
      <div style={{width:20,height:20,borderRadius:6,flexShrink:0,marginTop:2,border:isDone?"2px solid #4ade80":"2px solid #2a2a3c",background:isDone?"#4ade80":"transparent",display:"flex",alignItems:"center",justifyContent:"center",transition:"all 0.15s"}}>
        {isDone && <span style={{color:"#000",fontSize:11,fontWeight:800}}>✓</span>}
      </div>
      <div style={{flex:1, minWidth:0}}>
        <div style={{fontSize:14,fontWeight:600,color:isDone?"#6b6b8a":"#e8e8f0",textDecoration:isDone?"line-through":"none",lineHeight:1.4}}>{task.text}</div>
        {task.sub && <div style={{fontSize:11,color:"#5a5a7a",fontFamily:"'Space Mono',monospace",marginTop:3,lineHeight:1.4}}>{task.sub}</div>}

      <div style={{fontSize:10,fontFamily:"'Space Mono',monospace",padding:"3px 9px",borderRadius:100,border:isDone?"1px solid #4ade80":"1px solid #2a2a3c",color:isDone?"#4ade80":"#5a5a7a",background:isDone?"rgba(74,222,128,0.07)":"transparent",whiteSpace:"nowrap",flexShrink:0,alignSelf:"flex-start",marginTop:1}}>+{task.xp} XP</div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════
function TodayPage({ cats, done, onToggle, xp, maxXp, onStartFresh, dailySticker, maxedToday }) {
  const rank = getRank(xp);
  const pct = Math.min((xp / Math.max(maxXp, 1)) * 100, 100);
  const totalTasks = cats.flatMap(c => c.tasks).length;
  const completedTasks = done.size;

  return (
    <div>
      <DailyPrizeTeaser sticker={dailySticker} unlocked={maxedToday} />

      {/* XP Bar */}
      <div style={{background:"#0e0e1c",border:"1px solid #1a1a2e",borderRadius:18,padding:"18px 22px",marginBottom:22}}>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:10}}>
          <span style={{fontFamily:"'Space Mono',monospace",fontSize:10,letterSpacing:"0.12em",color:"#5a5a7a",textTransform:"uppercase"}}>⚡ Daily XP</span>
          <span style={{fontFamily:"'Space Mono',monospace",fontSize:12,color:"#f5c542",fontWeight:700}}>{xp} / {maxXp} XP</span>
        </div>
        <div style={{background:"#14142a",borderRadius:100,height:10,overflow:"hidden"}}>
          <div style={{height:"100%",borderRadius:100,width:`${pct}%`,background:"linear-gradient(90deg,#e8a820,#f5c542,#fffacd)",boxShadow:"0 0 12px rgba(245,197,66,0.5)",transition:"width 0.7s cubic-bezier(0.34,1.56,0.64,1)",animation:xp>0?"xpPulse 2s infinite":"none"}}/>
        </div>
        <div style={{display:"flex",justifyContent:"space-between",marginTop:10,alignItems:"center"}}>
          <span style={{fontFamily:"'Space Mono',monospace",fontSize:10,color:"#5a5a7a"}}>
            Rank: <span style={{color:"#f5c542",fontWeight:700}}>{rank.icon} {rank.label}</span>
          </span>
          <span style={{fontFamily:"'Space Mono',monospace",fontSize:10,color:"#5a5a7a"}}>{completedTasks}/{totalTasks} tasks</span>
        </div>
      </div>

      {/* All done banner */}
      {maxedToday && (
        <div style={{border:"1px solid #f5c542",borderRadius:16,padding:"20px 22px",textAlign:"center",marginBottom:24,background:"linear-gradient(135deg,rgba(245,197,66,0.07),rgba(167,139,250,0.07))"}}>
          <div style={{fontSize:20,fontWeight:800,marginBottom:5,background:"linear-gradient(135deg,#f5c542,#a78bfa)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>🏆 LEGENDARY DAY!</div>
          <div style={{fontFamily:"'Space Mono',monospace",fontSize:11,color:"#6b6b8a",marginBottom:14}}>Max XP achieved. Big sticker unlocked.</div>
          <button onClick={onStartFresh} style={{background:"rgba(245,197,66,0.1)",border:"1px solid rgba(245,197,66,0.3)",borderRadius:10,color:"#f5c542",padding:"9px 20px",fontSize:12,cursor:"pointer",fontFamily:"'Space Mono',monospace"}}>→ New Day</button>
        </div>
      )}

      {cats.length === 0 && (
        <div style={{textAlign:"center",padding:"50px 20px",color:"#3a3a5a",fontFamily:"'Space Mono',monospace",fontSize:13}}>Head to Edit to build today's quests ✏️</div>
      )}

      {cats.map(cat => {
        const catDone = cat.tasks.filter(t => done.has(t.id)).length;
        const rgb = h2r(cat.color);
        return (
          <div key={cat.id} style={{marginBottom:30}}>
            <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:12,paddingBottom:10,borderBottom:`1px solid rgba(${rgb},0.18)`}}>
              <span style={{fontSize:17}}>{cat.emoji}</span>
              <span style={{fontSize:10,fontFamily:"'Space Mono',monospace",letterSpacing:"0.12em",textTransform:"uppercase",color:cat.color}}>{cat.name}</span>
              <div style={{flex:1,height:1,background:`linear-gradient(90deg,rgba(${rgb},0.15),transparent)`}}/>
              <span style={{fontSize:10,fontFamily:"'Space Mono',monospace",color:catDone===cat.tasks.length&&cat.tasks.length>0?"#4ade80":"#5a5a7a"}}>{catDone}/{cat.tasks.length}{catDone===cat.tasks.length&&cat.tasks.length>0?" ✓":""}</span>
            </div>
            {cat.tasks.map(t => <TaskRow key={t.id} task={t} isDone={done.has(t.id)} onToggle={onToggle} catColor={cat.color} />)}
          </div>
        );
      })}

      {cats.length > 0 && (
        <div style={{textAlign:"center",marginTop:20,paddingTop:20,borderTop:"1px solid #14142a"}}>
          <button onClick={onStartFresh} style={{background:"none",border:"1px solid #1e1e30",borderRadius:10,color:"#5a5a7a",padding:"9px 20px",fontSize:11,cursor:"pointer",fontFamily:"'Space Mono',monospace"}}>🔄 Start Fresh / New Day</button>
        </div>
      )}
    </div>
  );
}

// PAGE: STICKERS

function StickersPage({ owned, blobOwned, stats, onSave, earnedLS }) {

  const totalLarge = earnedLS.length;

  const tabs = [
    {id:"packs", label:`Packs · ${totalOwned}/${allStickers.length}`},
    {id:"blobs", label:`Blobs · ${totalBlobs}/${BLOB_POOL.length}`},
    {id:"daily", label:`Daily · ${totalLarge}/${LARGE_STICKERS.length}`},

  return (
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18}}>

        <button onClick={onSave} style={{background:"rgba(245,197,66,0.08)",border:"1px solid rgba(245,197,66,0.25)",borderRadius:10,color:"#f5c542",padding:"7px 14px",fontSize:11,cursor:"pointer",fontFamily:"'Space Mono',monospace"}}>💾 save</button>

        ))}
      </div>

      {/* Packs view */}
      {view === "packs" && Object.entries(PACKS).map(([key, pack]) => {
        const isUnlocked = pack.unlockFn(stats);
        const rgb = h2r(pack.color);
        const packOwned = pack.stickers.filter(s => owned.has(s.id)).length;
        const isStreak = key === "streak_pack";

        return (
          <div key={key} style={{marginBottom:18,borderRadius:18,border:`1px solid ${isUnlocked?`rgba(${rgb},0.22)`:"rgba(255,255,255,0.04)"}`,background:isUnlocked?`rgba(${rgb},0.03)`:"#09090f",overflow:"hidden"}}>

                <span style={{fontSize:18}}>{pack.icon}</span>
                <span style={{fontSize:14,fontWeight:700,color:isUnlocked?pack.color:"#3a3a5a"}}>{pack.name}</span>
                {isStreak && <span style={{fontSize:8,fontFamily:"'Space Mono',monospace",color:"#f5c542",background:"rgba(245,197,66,0.1)",borderRadius:6,padding:"2px 7px"}}>streak</span>}
                <div style={{flex:1}}/>
                {isUnlocked
                  ? <span style={{fontSize:10,fontFamily:"'Space Mono',monospace",color:pack.color}}>{packOwned}/{pack.stickers.length}</span>
                  : <span style={{fontSize:14,opacity:0.4}}>🔒</span>
                }
              </div>
              <div style={{fontSize:10,fontFamily:"'Space Mono',monospace",color:isUnlocked?`rgba(${rgb},0.5)`:"#3a3a5a"}}>
                {isUnlocked ? "Drops randomly as you complete tasks." : (isStreak ? `🔥 ${pack.goal}` : `🔒 ${pack.goal}`)}

            </div>
            {/* Stickers grid */}
            <div style={{padding:"16px 18px 18px",display:"flex",flexWrap:"wrap",gap:10}}>

                const dimStreak = isStreak && !owned.has(s.id) && stats.streak < (s.streakReq || 1);

      {/* Blobs view */}
      {view === "blobs" && (
        <div>
          <div style={{fontSize:11,fontFamily:"'Space Mono',monospace",color:"#5a5a7a",marginBottom:22}}>Earns every 3 tasks completed. Collect all {BLOB_POOL.length} blobs.</div>
          <div style={{display:"flex",flexWrap:"wrap",gap:22,paddingBottom:20}}>
            {BLOB_POOL.map(b => <BlobCard key={b.id} blob={b} owned={blobOwned.has(b.id)} />)}
          </div>
        </div>
      )}

      {/* Daily large stickers */}
      {view === "daily" && (
        <div>
          <div style={{fontSize:11,fontFamily:"'Space Mono',monospace",color:"#5a5a7a",marginBottom:22}}>One glittery prize per day when you max XP. {LARGE_STICKERS.length} total — never repeats till you've seen them all.</div>
          <div style={{display:"flex",flexWrap:"wrap",gap:14}}>
            {LARGE_STICKERS.map(ls => {
              const isEarned = earnedLS.includes(ls.id);
              return (
                <div key={ls.id} style={{
                  width:100, height:100, borderRadius:18, display:"flex", flexDirection:"column",
                  alignItems:"center", justifyContent:"center", gap:5,
                  background: isEarned ? `radial-gradient(circle,${ls.glow},rgba(0,0,0,0))` : "#09090f",
                  border:`2px solid ${isEarned?ls.color:"rgba(255,255,255,0.04)"}`,
                  boxShadow: isEarned ? `0 0 20px ${ls.glow}` : "none",
                  filter: isEarned ? "none" : "grayscale(1) opacity(0.08)",
                  transition:"all 0.3s",
                }}>
                  <span style={{fontSize:34, filter:isEarned?"none":"opacity(0.2)", animation:isEarned?"glow-pulse 3s infinite":"none"}}>{ls.emoji}</span>
                  {isEarned && <span style={{fontSize:7,fontFamily:"'Space Mono',monospace",color:ls.color,textTransform:"uppercase",letterSpacing:"0.04em",textAlign:"center",padding:"0 5px"}}>{ls.name}</span>}
                </div>
              );
            })}
          </div>
        </div>
      )}
    </div>
  );
}

  return (
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18}}>

      </div>

      <div style={{display:"flex",gap:12,marginBottom:22}}>
        {[{l:"Total XP",v:totalXP,c:"#f5c542"},{l:"Days",v:history.length,c:"#a78bfa"},{l:"Tasks Done",v:totalTasks,c:"#4ade80"}].map(s => (

      {[...history].reverse().map((day, i) => {

              </div>
              <div style={{marginLeft:"auto",textAlign:"right"}}>
                <div style={{fontSize:18,fontWeight:800,color:"#f5c542"}}>{day.xp} XP</div>
                <div style={{fontSize:9,fontFamily:"'Space Mono',monospace",color:"#5a5a7a",marginTop:2}}>{day.tasksCompleted} tasks · {rank.icon} {rank.label}</div>
              </div>
            </div>

              <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:10}}>

                  <div key={j} style={{display:"flex",alignItems:"center",gap:5,background:"#14142a",borderRadius:8,padding:"4px 10px",border:`1px solid ${RARITY_STYLE[s.rarity]?.border||"#1a1a2e"}`}}>
                    <span style={{fontSize:12}}>{s.emoji}</span>
                    <span style={{fontSize:8,fontFamily:"'Space Mono',monospace",color:RARITY_STYLE[s.rarity]?.color||"#9ca3af"}}>{s.label}</span>

            <div style={{background:"#14142a",borderRadius:100,height:4,overflow:"hidden"}}>
              <div style={{height:"100%",borderRadius:100,width:`${Math.min((day.xp/1200)*100,100)}%`,background:"linear-gradient(90deg,#e8a820,#f5c542)"}}/>

}

  const set = fn => onChange(fn(cats));
  const setCat = (id,field,val) => set(cs => cs.map(c => c.id===id ? {...c,[field]:val} : c));
  const setTask = (catId,taskId,field,val) => set(cs => cs.map(c => c.id===catId ? {...c,tasks:c.tasks.map(t => t.id===taskId ? {...t,[field]:val} : t)} : c));
  const addTask = catId => set(cs => cs.map(c => c.id===catId ? {...c,tasks:[...c.tasks,{id:uid(),text:"New task",sub:"",xp:50}]} : c));
  const removeTask = (catId,taskId) => set(cs => cs.map(c => c.id===catId ? {...c,tasks:c.tasks.filter(t=>t.id!==taskId)} : c));
  const addCat = () => { const col=CAT_COLORS[Math.floor(Math.random()*CAT_COLORS.length)]; set(cs=>[...cs,{id:uid(),name:"New Category",emoji:"⭐",color:col,tasks:[]}]); };
  const removeCat = id => set(cs => cs.filter(c=>c.id!==id));
  const moveCat = (id,dir) => set(cs => { const i=cs.findIndex(c=>c.id===id),j=i+dir; if(j<0||j>=cs.length)return cs; const n=[...cs];[n[i],n[j]]=[n[j],n[i]];return n; });

  return (
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18}}>
        <h2 style={{fontSize:22,fontWeight:800,color:"#e8e8f0"}}>✏️ Build Your Day</h2>

      </div>

          <div style={{fontSize:9,fontFamily:"'Space Mono',monospace",color:"#60a5fa",textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:12}}>Templates</div>
          {!templates.length && <div style={{fontSize:11,color:"#3a3a5a",fontFamily:"'Space Mono',monospace",marginBottom:12}}>No templates yet.</div>}
          <div style={{display:"flex",flexDirection:"column",gap:7,marginBottom:12}}>
            {templates.map(tpl => (
              <div key={tpl.id} style={{display:"flex",alignItems:"center",gap:10,background:"#0e0e1c",borderRadius:10,padding:"10px 14px"}}>
                <span style={{flex:1,fontSize:13,fontWeight:600,color:"#e8e8f0"}}>{tpl.name}</span>
                <span style={{fontSize:10,fontFamily:"'Space Mono',monospace",color:"#5a5a7a"}}>{tpl.cats.reduce((s,c)=>s+c.tasks.length,0)} tasks</span>
                <button onClick={()=>{onLoadTpl(tpl);setShowTpl(false);}} style={{background:"rgba(96,165,250,0.08)",border:"1px solid rgba(96,165,250,0.22)",borderRadius:8,color:"#60a5fa",padding:"5px 12px",fontSize:11,cursor:"pointer",fontFamily:"'Space Mono',monospace"}}>load</button>

            <button onClick={()=>{if(tplName.trim()){onSaveTpl(tplName.trim());setTplName("");}}} style={{background:"rgba(96,165,250,0.08)",border:"1px solid rgba(96,165,250,0.22)",borderRadius:9,color:"#60a5fa",padding:"7px 16px",fontSize:11,cursor:"pointer",fontFamily:"'Space Mono',monospace"}}>save</button>

            <div style={{padding:"10px 14px 8px"}}>

                    <input value={task.sub} onChange={e=>setTask(cat.id,task.id,"sub",e.target.value)} placeholder="note (optional)" style={{width:"100%",background:"transparent",border:"none",color:"#5a5a7a",fontSize:11,padding:"2px 0",fontFamily:"'Space Mono',monospace",outline:"none"}}/>
                  </div>

      })}

      <button onClick={addCat} style={{width:"100%",background:"none",border:"1px dashed #1e1e30",borderRadius:14,color:"#5a5a7a",fontSize:13,padding:"14px",cursor:"pointer",fontFamily:"'Space Mono',monospace",marginBottom:20}}>+ add category</button>

// CONFETTI
// ═══════════════════════════════════════════════════════════════════
function spawnConfetti(count = 40) {
  const colors = ["#ff6b6b","#ffd700","#7c6af7","#c084fc","#4ade80","#60a5fa","#f472b6"];
  for (let i = 0; i < count; i++) {
    const el = document.createElement("div");
    el.style.cssText = `position:fixed;width:${6+Math.random()*8}px;height:${6+Math.random()*8}px;background:${colors[Math.floor(Math.random()*colors.length)]};border-radius:2px;left:${Math.random()*100}vw;top:-10px;z-index:900;animation:confetti ${0.8+Math.random()*1.2}s ease-in ${Math.random()*0.5}s forwards;pointer-events:none;`;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 2500);
  }
}

// ═══════════════════════════════════════════════════════════════════
// ROOT APP
// ═══════════════════════════════════════════════════════════════════
function App() {
  const [tab, setTab] = useState("today");

  // Core state — load from localStorage
  const saved = loadFromStorage();
  const [cats, setCats] = useState(() => saved?.cats || DEFAULT_CATS);
  const [done, setDone] = useState(() => new Set(saved?.done || []));
  const [owned, setOwned] = useState(() => new Set(saved?.owned || []));
  const [blobOwned, setBlobOwned] = useState(() => new Set(saved?.blobOwned || []));
  const [earnedLS, setEarnedLS] = useState(() => saved?.earnedLS || []);
  const [lsHistory, setLsHistory] = useState(() => saved?.lsHistory || []);
  const [history, setHistory] = useState(() => saved?.history || []);
  const [templates, setTemplates] = useState(() => saved?.templates || []);
  const [dailySticker, setDailySticker] = useState(() => {
    // pick sticker for today — persist across page loads for same day
    if (saved?.dailyStickerDate === todayKey() && saved?.dailyStickerId) {
      return LARGE_STICKERS.find(l => l.id === saved.dailyStickerId) || pickLargeSticker(saved?.lsHistory);
    }
    return pickLargeSticker(saved?.lsHistory || []);
  });
  const [drop, setDrop] = useState(null);
  const [showSave, setShowSave] = useState(false);
  const [toast, setToast] = useState({ msg:"", show:false });

  const toastTimer = useRef(null);
  const prevDone = useRef(done.size);
  const prevStreak = useRef(0);
  const blobCounter = useRef(saved?.blobCounter || 0);
  const maxedFiredRef = useRef(saved?.maxedFired || false);

  // Derived
  const allTasks = cats.flatMap(c => c.tasks);
  const xp = [...done].reduce((s, id) => s + (allTasks.find(t => t.id === id)?.xp || 0), 0);
  const maxXp = allTasks.reduce((s, t) => s + t.xp, 0);
  const catsCleared = cats.filter(c => c.tasks.length > 0 && c.tasks.every(t => done.has(t.id))).length;
  const maxedToday = xp >= maxXp && maxXp > 0;

  const streak = (() => {
    if (!history.length) return 0;
    const sorted = [...history].sort((a,b) => b.date.localeCompare(a.date));
    let count = 0, prev = null;
    for (const d of sorted) {
      const dt = new Date(d.date + "T12:00:00");
      if (!prev) { count = 1; prev = dt; continue; }
      if ((prev - dt) / 86400000 <= 1.5) { count++; prev = dt; } else break;
    }
    return count;
  })();

  const stats = { xp, done: done.size, catsCleared, allDone: maxedToday, streak };

  // Persist to localStorage
  useEffect(() => {
    saveToStorage({
      cats, done:[...done], owned:[...owned], blobOwned:[...blobOwned],
      earnedLS, lsHistory, history, templates,
      dailyStickerDate: todayKey(), dailyStickerId: dailySticker?.id,
      blobCounter: blobCounter.current, maxedFired: maxedFiredRef.current,
    });
  }, [cats, done, owned, blobOwned, earnedLS, lsHistory, history, templates, dailySticker]);

  function showToast(msg) {
    clearTimeout(toastTimer.current);
    setToast({ msg, show:true });
    toastTimer.current = setTimeout(() => setToast(t => ({...t, show:false})), 2400);
  }

  function toggleTask(id) {
    const wasDone = done.has(id);
    if (wasDone) return; // can't uncheck — keep it motivating
    const task = allTasks.find(t => t.id === id);
    setDone(prev => { const n = new Set(prev); n.add(id); return n; });
    if (task) showToast(`${TASK_TOASTS[Math.floor(Math.random()*TASK_TOASTS.length)]}  +${task.xp} XP`);
  }

  // React to done changing
  useEffect(() => {
    if (done.size <= prevDone.current) { prevDone.current = done.size; return; }
    prevDone.current = done.size;

    blobCounter.current += 1;
    if (blobCounter.current >= 3) {
      blobCounter.current = 0;
      const b = pickBlob(blobOwned);
      setBlobOwned(prev => new Set([...prev, b.id]));
      setTimeout(() => setDrop({...b, type:"blob"}), 200);
      return;
    }

    // Sticker drop from packs
    const unlockedPacks = Object.keys(PACKS).filter(k => PACKS[k].unlockFn(stats));
    if (unlockedPacks.length && Math.random() > 0.4) {
      const key = unlockedPacks[Math.floor(Math.random() * unlockedPacks.length)];
      const d = rollDrop(key, owned, stats);
      if (d) {
        setOwned(prev => new Set([...prev, d.id]));
        setTimeout(() => setDrop(d), 300);
      }
    }
  }, [done.size]);

  // Big daily sticker on max XP
  useEffect(() => {
    if (maxedToday && !maxedFiredRef.current && dailySticker) {
      maxedFiredRef.current = true;
      spawnConfetti(60);
      setEarnedLS(prev => [...new Set([...prev, dailySticker.id])]);
      setLsHistory(prev => [...new Set([...prev, dailySticker.id])]);
      setTimeout(() => setDrop({...dailySticker, type:"large"}), 800);
    }
  }, [maxedToday]);

  // Streak stickers
  useEffect(() => {
    if (streak <= prevStreak.current) return;
    prevStreak.current = streak;
    PACKS.streak_pack.stickers.forEach(s => {
      if (streak >= (s.streakReq || 1) && !owned.has(s.id) && Math.random() < 0.85) {
        setTimeout(() => {
          setOwned(prev => new Set([...prev, s.id]));
          setDrop({...s, packKey:"streak_pack"});
        }, 600);
      }
    });
  }, [streak]);

  function startFresh() {
    if (done.size > 0) {
      const key = todayKey();
      const se = [...owned].map(sid => {
        for (const p of Object.values(PACKS)) { const s = p.stickers.find(st => st.id === sid); if (s) return s; }
        return null;
      }).filter(Boolean).slice(-8);
      setHistory(h => [...h.filter(d => d.date !== key), { date:key, xp, tasksCompleted:done.size, stickersEarned:se }]);
    }
    maxedFiredRef.current = false;
    blobCounter.current = 0;
    setDone(new Set());
    setDailySticker(pickLargeSticker([...lsHistory]));
  }

  function handleRestore(data) {
    setOwned(new Set(data.o || []));
    setBlobOwned(new Set(data.b || []));
    setHistory(data.h || []);
    setLsHistory(data.ls || []);
    showToast("✓ Progress restored!");
  }

  function saveTpl(name) {
    const tpl = { id:uid(), name, cats: cats.map(c => ({...c,id:uid(),tasks:c.tasks.map(t=>({...t,id:uid()}))})) };
    setTemplates(ts => [...ts, tpl]);
    showToast(`Saved template: ${name}`);
  }

  function loadTpl(tpl) {
    setCats(tpl.cats.map(c => ({...c, id:uid(), tasks:c.tasks.map(t=>({...t, id:uid()}))})));
    setDone(new Set());
    showToast(`Loaded: ${tpl.name}`);
  }

  const TABS = [
    {id:"today",   icon:"⚡", label:"Today"},
    {id:"edit",    icon:"✏️", label:"Edit"},
    {id:"stickers",icon:"✨", label:"Stickers"},
    {id:"history", icon:"📅", label:"History"},
  ];

  return (
    <div style={{minHeight:"100vh", background:"#07070f", color:"#e8e8f0",
      backgroundImage:"radial-gradient(ellipse at 15% 0%,rgba(124,106,247,0.06) 0%,transparent 55%), radial-gradient(ellipse at 85% 100%,rgba(245,197,66,0.04) 0%,transparent 55%)"}}>

      {/* Sticky nav */}
      <div style={{position:"sticky",top:0,zIndex:200,background:"rgba(7,7,15,0.94)",backdropFilter:"blur(14px)",borderBottom:"1px solid #0f0f1e"}}>
        <div style={{maxWidth:1100,margin:"0 auto",padding:"0 24px",display:"flex",alignItems:"center",height:54,gap:4}}>
          <span style={{fontWeight:800,fontSize:15,marginRight:"auto",background:"linear-gradient(135deg,#fff 0%,#f5c542 100%)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",letterSpacing:"-0.5px"}}>Quest Day</span>
          {streak > 0 && <span style={{fontFamily:"'Space Mono',monospace",fontSize:11,color:"#f5c542",marginRight:8}}>🔥{streak}</span>}
          {maxXp > 0 && <span style={{fontFamily:"'Space Mono',monospace",fontSize:10,color:xp>=maxXp?"#4ade80":"#5a5a7a",marginRight:8}}>{xp}/{maxXp} XP</span>}
          {TABS.map(t => (
            <button key={t.id} onClick={() => setTab(t.id)} style={{
              background: tab===t.id ? "rgba(245,197,66,0.09)" : "none",
              border: tab===t.id ? "1px solid rgba(245,197,66,0.2)" : "1px solid transparent",
              borderRadius:9, color:tab===t.id?"#f5c542":"#5a5a7a",
              padding:"6px 14px", fontSize:13, cursor:"pointer", fontFamily:"inherit",
              fontWeight: tab===t.id ? 700 : 500, transition:"all 0.15s",
            }}>{t.icon} {t.label}</button>
          ))}
        </div>
      </div>

      {/* Main content */}
      <div style={{maxWidth:1100,margin:"0 auto",padding:"32px 24px 100px"}}>

        {/* Page heading */}
        <div style={{textAlign:"center",marginBottom:28}}>
          <div style={{fontFamily:"'Space Mono',monospace",fontSize:9,letterSpacing:"0.14em",color:"#3a3a5a",textTransform:"uppercase",marginBottom:8}}>
            {new Date().toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric",year:"numeric"})}
          </div>
          <h1 style={{fontSize:"clamp(22px,3.5vw,38px)",fontWeight:800,lineHeight:1.1,
            background:"linear-gradient(135deg,#fff 0%,#f5c542 50%,#a78bfa 100%)",
            WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",backgroundClip:"text",margin:0}}>
            {tab==="today"?"Today's Quests":tab==="edit"?"Build Your Day":tab==="stickers"?"Sticker Collection":"History"}
          </h1>
        </div>

        {/* Two-column layout for today */}
        {tab === "today" ? (
          <div style={{display:"grid",gridTemplateColumns:"1fr 340px",gap:28,alignItems:"start"}}>
            <TodayPage cats={cats} done={done} onToggle={toggleTask} xp={xp} maxXp={maxXp} onStartFresh={startFresh} dailySticker={dailySticker} maxedToday={maxedToday}/>
            {/* Right sidebar: mini sticker preview */}
            <div style={{position:"sticky",top:80}}>
              <div style={{background:"#0e0e1c",border:"1px solid #1a1a2e",borderRadius:18,padding:"18px 16px",marginBottom:16}}>
                <div style={{fontSize:9,fontFamily:"'Space Mono',monospace",color:"#5a5a7a",textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:14}}>Your Collection</div>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:16}}>
                  {[
                    {emoji:"✨",val:Object.values(PACKS).flatMap(p=>p.stickers).filter(s=>owned.has(s.id)).length,label:"stickers"},
                    {emoji:"🫧",val:BLOB_POOL.filter(b=>blobOwned.has(b.id)).length,label:"blobs"},
                    {emoji:"🏆",val:earnedLS.length,label:"daily"},
                  ].map(s => (
                    <div key={s.label} style={{textAlign:"center",flex:1}}>
                      <div style={{fontSize:18}}>{s.emoji}</div>
                      <div style={{fontSize:17,fontWeight:800,color:"#f5c542"}}>{s.val}</div>
                      <div style={{fontSize:8,fontFamily:"'Space Mono',monospace",color:"#5a5a7a",textTransform:"uppercase"}}>{s.label}</div>
                    </div>
                  ))}
                </div>
                <button onClick={() => setTab("stickers")} style={{width:"100%",background:"rgba(245,197,66,0.06)",border:"1px solid rgba(245,197,66,0.18)",borderRadius:10,color:"#f5c542",padding:"9px",fontSize:11,cursor:"pointer",fontFamily:"'Space Mono',monospace"}}>view collection →</button>
              </div>

              {/* Rank card */}
              {(() => { const rank = getRank(xp); const next = RANKS.find(r => r.min > xp); const pct = next ? Math.min((xp/next.min)*100,100) : 100; return (
                <div style={{background:"#0e0e1c",border:"1px solid #1a1a2e",borderRadius:18,padding:"18px 16px"}}>
                  <div style={{fontSize:9,fontFamily:"'Space Mono',monospace",color:"#5a5a7a",textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:10}}>Rank</div>
                  <div style={{fontSize:22,fontWeight:800,color:"#f5c542",marginBottom:4}}>{rank.icon} {rank.label}</div>
                  {next && <>
                    <div style={{fontSize:10,fontFamily:"'Space Mono',monospace",color:"#5a5a7a",marginBottom:8}}>{xp}/{next.min} XP → {next.icon} {next.label}</div>
                    <div style={{background:"#14142a",borderRadius:100,height:6,overflow:"hidden"}}>
                      <div style={{height:"100%",borderRadius:100,width:`${pct}%`,background:"linear-gradient(90deg,#e8a820,#f5c542)",transition:"width 0.5s ease"}}/>
                    </div>
                  </>}
                </div>
              )})()}
            </div>
          </div>
        ) : (
          <div style={{maxWidth:740,margin:"0 auto"}}>
            {tab==="edit"     && <EditPage cats={cats} onChange={setCats} templates={templates} onSaveTpl={saveTpl} onLoadTpl={loadTpl} onDeleteTpl={id=>setTemplates(ts=>ts.filter(t=>t.id!==id))}/>}
            {tab==="stickers" && <StickersPage owned={owned} blobOwned={blobOwned} stats={stats} onSave={()=>setShowSave(true)} earnedLS={earnedLS}/>}
            {tab==="history"  && <HistoryPage history={history} streak={streak}/>}
          </div>
        )}
      </div>

      {/* Drop modal */}
      {drop && <DropModal drop={drop} onClose={() => setDrop(null)}/>}

      {/* Save modal */}
      {showSave && <SaveModal owned={owned} blobOwned={blobOwned} history={history} streak={streak} lsHistory={lsHistory} onClose={()=>setShowSave(false)} onRestore={handleRestore}/>}

      {/* Toast */}
      <div style={{position:"fixed",bottom:28,left:"50%",transform:`translateX(-50%) translateY(${toast.show?0:60}px)`,opacity:toast.show?1:0,transition:"all 0.35s cubic-bezier(0.34,1.56,0.64,1)",background:"#14142a",border:"1px solid #2a2a3c",borderRadius:14,padding:"11px 20px",fontFamily:"'Space Mono',monospace",fontSize:12,color:"#f5c542",zIndex:300,boxShadow:"0 10px 40px rgba(0,0,0,0.6)",pointerEvents:"none",whiteSpace:"nowrap"}}>
        {toast.msg}
      </div>
    </div>
  );
}

ReactDOM.render(<App/>, document.getElementById("root"));
</script>
</body>
</html>
